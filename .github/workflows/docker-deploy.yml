name: Build and Deploy to VM101

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: grid-pilot/ezbookkeeping

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/grid-pilot/ezbookkeeping:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_UNIXTIME=${{ github.run_id }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy to VM101
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM101_HOST }}
          username: ${{ secrets.VM101_USER }}
          key: ${{ secrets.VM101_SSH_KEY }}
          script: |
            docker pull ghcr.io/grid-pilot/ezbookkeeping:latest
            cd /home/devops/new_docker_structure/stacks/finance
            docker compose -f docker-compose.yml up -d ezbookkeeping
            echo "Deployed $(date)"
