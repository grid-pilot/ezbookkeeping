name: Sync Upstream and Deploy

on:
  schedule:
    - cron: '0 4 * * *'  # щодня о 4:00 UTC (6:00 Київ)
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    outputs:
      updated: ${{ steps.sync.outputs.has_new_commits }}

    steps:
      - name: Sync fork with upstream
        id: sync
        uses: aormsby/Fork-Sync-With-Upstream-action@v3.4
        with:
          upstream_sync_repo: mayswind/ezbookkeeping
          upstream_sync_branch: main
          target_sync_branch: main
          target_repo_token: ${{ secrets.GITHUB_TOKEN }}

  build-and-deploy:
    runs-on: ubuntu-latest
    needs: sync
    if: needs.sync.outputs.updated == 'true'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/grid-pilot/ezbookkeeping:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to VM101
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM101_HOST }}
          username: ${{ secrets.VM101_USER }}
          key: ${{ secrets.VM101_SSH_KEY }}
          script: |
            docker pull ghcr.io/grid-pilot/ezbookkeeping:latest
            cd /home/devops/new_docker_structure/stacks/finance
            docker compose -f docker-compose.yml up -d ezbookkeeping
            echo "Deployed $(date)"
